services:
  db:
    image: postgres:18.0-alpine
    profiles: [dev]
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_USER: ${DB_USERNAME}
      PGUSER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME} || pg_isready']
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Database Initialization (migrations + seeding)
  db-init:
    image: wxyc-db-init-image
    profiles: [dev]
    build:
      context: ..
      dockerfile: dev_env/Dockerfile.init
    container_name: wxyc-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db # Differentiates between db containers with internal network hostname
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      # Explicit opt-in (BS#951). The seed-clone.sql file is checked into
      # the repo, so existsSync alone can't distinguish dev from CI when
      # init-db.mjs is invoked directly (as CI does). Setting this env var
      # only on the dev-profile container keeps the clone scoped to
      # `npm run db:start` and not `node dev_env/init-db.mjs` in CI.
      - LOAD_CLONE_FIXTURE=true
    restart: 'no' # Only run once
    volumes:
      - ../drizzle.config.ts:/init/drizzle.config.ts
      - ../shared/database/src/schema.ts:/init/database/schema.ts
      - ../shared/database/src/migrations:/init/database/migrations
      - ./install_extensions.sql:/init/install_extensions.sql
      - ./seed_db.sql:/init/seed_db.sql
      # Dev-only prod-clone fixture (BS#947). Mounted here but NOT into
      # ci-db-init, so CI keeps its small seed_db.sql fixture and existing
      # integration tests' fixed-ID assumptions.
      - ./seed-clone.sql:/init/seed-clone.sql

  ci-db:
    image: postgres:18.0-alpine
    profiles: [ci]
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      PGUSER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${CI_DB_PORT:-5433}:5432'
    volumes:
      - ci-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME} || pg_isready']
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Database Initialization (migrations + seeding)
  ci-db-init:
    image: wxyc-db-init-image
    profiles: [ci]
    build:
      context: ..
      dockerfile: dev_env/Dockerfile.init
    container_name: wxyc-ci-db-init
    depends_on:
      ci-db:
        condition: service_healthy
    environment:
      - DB_HOST=ci-db # Differentiates between db containers with internal network hostname
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    restart: 'no' # Only run once
    volumes:
      - ../drizzle.config.ts:/init/drizzle.config.ts
      - ../shared/database/src/schema.ts:/init/database/schema.ts
      - ../shared/database/src/migrations:/init/database/migrations
      - ./install_extensions.sql:/init/install_extensions.sql
      - ./seed_db.sql:/init/seed_db.sql

  auth:
    depends_on:
      ci-db:
        condition: service_healthy
    image: wxyc_auth_service:ci
    build:
      context: '../'
      dockerfile: Dockerfile.auth
      args:
        NPM_TOKEN: ${NPM_TOKEN:-}
    profiles: [ci]
    environment:
      - AUTH_PORT=8080
      - NODE_ENV=test
      - DB_HOST=ci-db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - BETTER_AUTH_URL=http://auth:8080/auth
      - BETTER_AUTH_JWKS_URL=http://auth:8080/auth/jwks
      - BETTER_AUTH_ISSUER=http://auth:8080
      - BETTER_AUTH_AUDIENCE=http://auth:8080
      - BETTER_AUTH_TRUSTED_ORIGINS=${BETTER_AUTH_TRUSTED_ORIGINS}
      - FRONTEND_SOURCE=${FRONTEND_SOURCE}
      - DEFAULT_ORG_SLUG=${DEFAULT_ORG_SLUG}
      - DEFAULT_ORG_NAME=${DEFAULT_ORG_NAME}
      - DEFAULT_USER_EMAIL=${DEFAULT_USER_EMAIL}
      - DEFAULT_USER_USERNAME=${DEFAULT_USER_USERNAME}
      - DEFAULT_USER_PASSWORD=${DEFAULT_USER_PASSWORD}
      - DEFAULT_USER_DJ_NAME=${DEFAULT_USER_DJ_NAME}
      - DEFAULT_USER_REAL_NAME=${DEFAULT_USER_REAL_NAME}
      - CREATE_DEFAULT_USER=${CREATE_DEFAULT_USER}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - SES_FROM_EMAIL=${SES_FROM_EMAIL}
      - PASSWORD_RESET_REDIRECT_URL=${PASSWORD_RESET_REDIRECT_URL}
      - EMAIL_VERIFICATION_REDIRECT_URL=${EMAIL_VERIFICATION_REDIRECT_URL}
    ports:
      - '${CI_AUTH_PORT:-8083}:8080'

  mock-api:
    profiles: [ci]
    build:
      context: mock-api-server
      dockerfile: Dockerfile
    image: wxyc-mock-api:ci
    ports:
      - '${MOCK_API_PORT:-9090}:9090'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:9090/_admin/health || exit 1']
      interval: 2s
      timeout: 5s
      retries: 5

  backend:
    depends_on:
      - ci-db
      - auth
      - mock-api
    image: wxyc_backend_service:ci
    build:
      context: '../'
      dockerfile: Dockerfile.backend
      args:
        NPM_TOKEN: ${NPM_TOKEN:-}
    profiles: [ci]
    environment:
      # Override the Dockerfile's `ENV NODE_ENV=production` pin (BS#1097) so
      # the positive-list AUTH_BYPASS guard engages for the integration suite.
      # Matches the auth service's `NODE_ENV=test` above.
      - NODE_ENV=test
      - DB_HOST=ci-db
      # In-container port: hardcoded to match what postgres listens on
      # inside the docker network. Host-side `DB_PORT` (e.g. the dev
      # profile's `5436`) is the host-port mapping for `db`/`ci-db` and
      # must not leak into consumer services — see BS#959 / BS#413.
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - AUTH_BYPASS=${AUTH_BYPASS}
      - AUTH_USERNAME=${AUTH_USERNAME}
      - COGNITO_USERPOOL_ID=${COGNITO_USERPOOL_ID}
      - DJ_APP_CLIENT_ID=${DJ_APP_CLIENT_ID}
      - BETTER_AUTH_URL=http://auth:8080/auth
      - BETTER_AUTH_AUDIENCE=http://auth:8080
      - BETTER_AUTH_ISSUER=http://auth:8080
      - BETTER_AUTH_JWKS_URL=http://auth:8080/auth/jwks
      # Metadata: route through mock LML server
      - LIBRARY_METADATA_URL=http://mock-api:9090
      - METADATA_ALBUM_CACHE_MAX_SIZE=${METADATA_ALBUM_CACHE_MAX_SIZE:-1000}
      - METADATA_ARTIST_CACHE_MAX_SIZE=${METADATA_ARTIST_CACHE_MAX_SIZE:-500}
      - METADATA_ROTATION_PRIORITY=${METADATA_ROTATION_PRIORITY:-2.0}
      # LML client limiter: disable in CI. The integration suite runs hundreds
      # of fire-and-forget /lookup calls across spec files under --runInBand;
      # the module-level TokenBucket(50/min) would drain partway through and
      # subsequent calls would queue ~1200ms each, timing out metadata-lml
      # tests at 30s (BS#955). Mirrors the unit-test override convention at
      # tests/unit/services/lml.client.test.ts:792-793.
      - LML_CLIENT_MAX_CONCURRENT=10000
      - LML_CLIENT_RATE_PER_MIN=60000
      - USE_MOCK_SERVICES=false
      # Anonymous device authentication
      - ANON_DEVICE_JWT_SECRET=${ANON_DEVICE_JWT_SECRET:-ci-test-secret-key-for-anonymous-devices}
      # Slack: route through mock server
      - SLACK_WEBHOOK_URL=http://mock-api:9090
      - SLACK_WXYC_REQUESTS_WEBHOOK=/services/T00/B00/ci-test-webhook
      # Slack failure simulation (for testing error handling)
      # Set SIMULATE_SLACK_FAILURE=true to test Slack webhook failure scenarios
      - SIMULATE_SLACK_FAILURE=${SIMULATE_SLACK_FAILURE:-false}
      # Mirror: route HTTP mirror through mock tubafrenzy
      - TUBAFRENZY_URL=http://mock-api:9090
      - MIRROR_API_KEY=ci-test-mirror-key
      # Internal endpoints (ETL notify, tubafrenzy webhook). The
      # authenticateInternal() check fails closed on an empty key, so the
      # tubafrenzy-webhook integration spec needs this wired explicitly.
      # Matches the test's fallback default.
      - ETL_NOTIFY_KEY=${ETL_NOTIFY_KEY:-test-secret-key}
      # Rate limiting configuration
      # Set TEST_RATE_LIMITING=true to enable rate limiting in test mode
      # Use ci:env:full and ci:test:full npm scripts to run with rate limiting enabled
      - TEST_RATE_LIMITING=${TEST_RATE_LIMITING:-false}
      # Rate limit config (only applies when TEST_RATE_LIMITING=true):
      - RATE_LIMIT_REQUEST_WINDOW_MS=2000
      - RATE_LIMIT_REQUEST_MAX=20
      # Catalog Track Search: activate both fallbacks for integration tests.
      # Plan: WXYC/wiki plans/catalog-track-search.md §10.1. Defaults to off in
      # prod; CI flips both flags on so tests/integration/library.spec.js
      # exercises the full cascade (Track 1 = CTA, Track 2 = LML cross-ref).
      # The mock LML server's POST /api/v1/lookup handles song-only requests
      # via its `songLookup` fixture map (BS#825).
      - CATALOG_TRACK_SEARCH_CTA_ENABLED=${CATALOG_TRACK_SEARCH_CTA_ENABLED:-true}
      - CATALOG_TRACK_SEARCH_DISCOGS_ENABLED=${CATALOG_TRACK_SEARCH_DISCOGS_ENABLED:-true}
    ports:
      - '${CI_PORT:-8081}:8080'

  # E2E Test Profile Services
  # These services are specifically for running E2E tests with the frontend
  e2e-db:
    image: postgres:18.0-alpine
    profiles: [e2e]
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-e2epassword}
      POSTGRES_USER: ${DB_USERNAME:-e2euser}
      PGUSER: ${DB_USERNAME:-e2euser}
      POSTGRES_DB: ${DB_NAME:-e2edb}
    ports:
      - '${E2E_DB_PORT:-5434}:5432'
    volumes:
      - e2e-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U e2euser -d e2edb || pg_isready']
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  e2e-db-init:
    image: wxyc-db-init-image
    profiles: [e2e]
    build:
      context: ..
      dockerfile: dev_env/Dockerfile.init
    container_name: wxyc-e2e-db-init
    depends_on:
      e2e-db:
        condition: service_healthy
    environment:
      - DB_HOST=e2e-db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-e2euser}
      - DB_PASSWORD=${DB_PASSWORD:-e2epassword}
      - DB_NAME=${DB_NAME:-e2edb}
    restart: 'no'
    volumes:
      - ../drizzle.config.ts:/init/drizzle.config.ts
      - ../shared/database/src/schema.ts:/init/database/schema.ts
      - ../shared/database/src/migrations:/init/database/migrations
      - ./install_extensions.sql:/init/install_extensions.sql
      - ./seed_db.sql:/init/seed_db.sql

  e2e-auth:
    depends_on:
      e2e-db:
        condition: service_healthy
    image: wxyc_auth_service:e2e
    build:
      context: '../'
      dockerfile: Dockerfile.auth
      args:
        NPM_TOKEN: ${NPM_TOKEN:-}
    profiles: [e2e]
    environment:
      - AUTH_PORT=8080
      - DB_HOST=e2e-db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-e2euser}
      - DB_PASSWORD=${DB_PASSWORD:-e2epassword}
      - DB_NAME=${DB_NAME:-e2edb}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-e2e-auth-secret-for-testing-minimum-32-chars}
      - BETTER_AUTH_URL=http://e2e-auth:8080/auth
      - BETTER_AUTH_JWKS_URL=http://e2e-auth:8080/auth/jwks
      - BETTER_AUTH_ISSUER=http://e2e-auth:8080
      - BETTER_AUTH_AUDIENCE=http://e2e-auth:8080
      - BETTER_AUTH_TRUSTED_ORIGINS=http://localhost:3000,http://e2e-frontend:3000
      - FRONTEND_SOURCE=http://localhost:3000
      - DEFAULT_ORG_SLUG=test-org
      - DEFAULT_ORG_NAME=Test Organization
      - APP_ORGANIZATION_ID=test-org-id-0000000000000000001
    ports:
      - '${E2E_AUTH_PORT:-8084}:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/healthcheck || exit 1']
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  e2e-backend:
    depends_on:
      e2e-db:
        condition: service_healthy
      e2e-auth:
        condition: service_healthy
    image: wxyc_backend_service:e2e
    build:
      context: '../'
      dockerfile: Dockerfile.backend
      args:
        NPM_TOKEN: ${NPM_TOKEN:-}
    profiles: [e2e]
    environment:
      - DB_HOST=e2e-db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-e2euser}
      - DB_PASSWORD=${DB_PASSWORD:-e2epassword}
      - DB_NAME=${DB_NAME:-e2edb}
      - AUTH_BYPASS=false
      - BETTER_AUTH_URL=http://e2e-auth:8080/auth
      - BETTER_AUTH_AUDIENCE=http://e2e-auth:8080
      - BETTER_AUTH_ISSUER=http://e2e-auth:8080
      - BETTER_AUTH_JWKS_URL=http://e2e-auth:8080/auth/jwks
      - COGNITO_USERPOOL_ID=us-east-1_placeholder
    ports:
      - '${E2E_BACKEND_PORT:-8085}:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/healthcheck || exit 1']
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ETL E2E Test Profile Services
  # MySQL source database for testing ETL jobs against real tubafrenzy schema
  etl-mysql:
    image: mysql:8.0
    profiles: [etl]
    environment:
      MYSQL_ROOT_PASSWORD: etltest
      MYSQL_DATABASE: wxycmusic
      MYSQL_USER: etluser
      MYSQL_PASSWORD: etltest
    ports:
      - '${ETL_MYSQL_PORT:-3307}:3306'
    volumes:
      - ./etl-seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'etluser', '-petltest']
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 20s

  etl-pg:
    image: postgres:18.0-alpine
    profiles: [etl]
    environment:
      POSTGRES_PASSWORD: etltest
      POSTGRES_USER: etluser
      PGUSER: etluser
      POSTGRES_DB: etldb
    ports:
      - '${ETL_PG_PORT:-5435}:5432'
    volumes:
      - etl-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U etluser -d etldb || pg_isready']
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  etl-db-init:
    image: wxyc-db-init-image
    profiles: [etl]
    build:
      context: ..
      dockerfile: dev_env/Dockerfile.init
    container_name: wxyc-etl-db-init
    depends_on:
      etl-pg:
        condition: service_healthy
    environment:
      - DB_HOST=etl-pg
      - DB_PORT=5432
      - DB_USERNAME=etluser
      - DB_PASSWORD=etltest
      - DB_NAME=etldb
    restart: 'no'
    volumes:
      - ../drizzle.config.ts:/init/drizzle.config.ts
      - ../shared/database/src/schema.ts:/init/database/schema.ts
      - ../shared/database/src/migrations:/init/database/migrations
      - ./install_extensions.sql:/init/install_extensions.sql
      - ./etl-seed-pg.sql:/init/seed_db.sql

volumes:
  pg-data:
  ci-pg-data:
  e2e-pg-data:
  etl-pg-data:
