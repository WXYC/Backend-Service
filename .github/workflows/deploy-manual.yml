name: Manual Build & Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'The application target to deploy (e.g., backend, auth).'
        required: true
        type: string
      version:
        description: 'The specific version to deploy (e.g., v1.2.3). Defaults to latest if not provided.'
        required: false
        type: string

# Workflow-level GITHUB_TOKEN scope. No job in this file pushes code,
# comments on PRs, or creates releases; all writes to external services
# use their own non-GITHUB_TOKEN secrets. contents:read is the safe floor.
permissions:
  contents: read

jobs:
  trigger-build-and-deploy:
    uses: ./.github/workflows/deploy-base.yml
    with:
      target: ${{ github.event.inputs.target }}
      version: ${{ github.event.inputs.version || 'latest' }}
    secrets: inherit
