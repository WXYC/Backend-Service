name: Run Tests

on:
  pull_request:
    branches:
      - main

env:
  TEST_HOST: http://localhost
  CI_DB_PORT: 5433
  CI_PORT: 8081
  DB_USERNAME: test-user
  DB_PASSWORD: test-pw
  DB_NAME: wxyc_db
  AUTH_BYPASS: true

jobs:
  Integration-Tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build db-init image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dev_env/Dockerfile.init
          load: true
          tags: wxyc-db-init-image:latest
          cache-from: type=gha,scope=db-init
          cache-to: type=gha,mode=max,scope=db-init

      - name: Build auth image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.auth
          load: true
          tags: wxyc_auth_service:ci
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          load: true
          tags: wxyc_backend_service:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --only=dev

      - name: Lint .env file
        run: npm run lint:env

      - name: Start Test Environment
        run: |
          touch .env
          COMPOSE="docker compose -f dev_env/docker-compose.yml --env-file .env --profile ci"
          $COMPOSE up -d ci-db
          $COMPOSE up ci-db-init
          $COMPOSE up -d auth backend

      - name: Run Tests
        run: npm run ci:test

      - name: Clean Up Test Environment
        if: always()
        run: npm run ci:clean
