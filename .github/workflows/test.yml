name: Run Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  TEST_HOST: http://localhost
  CI_DB_PORT: 5433
  CI_PORT: 8081
  DB_USERNAME: test-user
  DB_PASSWORD: test-pw
  DB_NAME: wxyc_db
  AUTH_BYPASS: true
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/wxyc/backend-service

jobs:
  Integration-Tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            db-init:
              - 'package.json'
              - 'package-lock.json'
              - 'dev_env/Dockerfile.init'
              - 'dev_env/init-db.mjs'
              - 'drizzle.config.ts'
              - 'shared/database/src/schema.ts'
              - 'shared/database/src/migrations/**'
            auth:
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
              - 'Dockerfile.auth'
              - 'apps/auth/**'
              - 'shared/database/**'
              - 'shared/authentication/**'
            backend:
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
              - 'Dockerfile.backend'
              - 'apps/backend/**'
              - 'shared/database/**'
              - 'shared/authentication/**'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # db-init image
      - name: Pull db-init image
        if: steps.changes.outputs.db-init == 'false'
        id: pull-db-init
        continue-on-error: true
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}/db-init:main
          docker tag ${{ env.IMAGE_PREFIX }}/db-init:main wxyc-db-init-image

      - name: Build db-init image
        if: steps.changes.outputs.db-init == 'true' || steps.pull-db-init.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dev_env/Dockerfile.init
          load: true
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            wxyc-db-init-image
            ${{ env.IMAGE_PREFIX }}/db-init:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/db-init:main
          cache-from: type=gha,scope=db-init
          cache-to: type=gha,mode=max,scope=db-init

      # auth image
      - name: Pull auth image
        if: steps.changes.outputs.auth == 'false'
        id: pull-auth
        continue-on-error: true
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}/auth:main
          docker tag ${{ env.IMAGE_PREFIX }}/auth:main wxyc_auth_service:ci

      - name: Build auth image
        if: steps.changes.outputs.auth == 'true' || steps.pull-auth.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.auth
          load: true
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            wxyc_auth_service:ci
            ${{ env.IMAGE_PREFIX }}/auth:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/auth:main
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth

      # backend image
      - name: Pull backend image
        if: steps.changes.outputs.backend == 'false'
        id: pull-backend
        continue-on-error: true
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}/backend:main
          docker tag ${{ env.IMAGE_PREFIX }}/backend:main wxyc_backend_service:ci

      - name: Build backend image
        if: steps.changes.outputs.backend == 'true' || steps.pull-backend.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          load: true
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            wxyc_backend_service:ci
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/backend:main
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --only=dev

      - name: Set Up Test Environment
        run: |
          touch .env
          COMPOSE="docker compose -f dev_env/docker-compose.yml --env-file .env --profile ci"
          $COMPOSE up -d ci-db
          $COMPOSE up ci-db-init
          $COMPOSE up -d auth backend

      - name: Run Tests
        run: npm run ci:test

      - name: Clean Up Test Environment
        if: always()
        run: npm run ci:clean
