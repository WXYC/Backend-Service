version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      better-auth:
        patterns:
          - 'better-auth'
          - '@better-auth/*'
      drizzle:
        patterns:
          - 'drizzle-orm'
          - 'drizzle-kit'
      wxyc-shared:
        patterns:
          - '@wxyc/shared'
      dev-dependencies:
        dependency-type: 'development'
        exclude-patterns:
          - 'better-auth'
          - '@better-auth/*'
          - 'drizzle-orm'
          - 'drizzle-kit'
          - '@wxyc/shared'
      production-dependencies:
        dependency-type: 'production'
        exclude-patterns:
          - 'better-auth'
          - '@better-auth/*'
          - 'drizzle-orm'
          - 'drizzle-kit'
          - '@wxyc/shared'
    ignore:
      # Hold TypeScript at v6: ts-jest (peers <7) and typescript-eslint (peers <6.1)
      # have no TS7-compatible release yet (checked 2026-07-16). A grouped major bump
      # to typescript@7 fails `npm ci` with ERESOLVE before tests run. Lift this and
      # upgrade TypeScript as a tracked change once the toolchain supports TS7.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
