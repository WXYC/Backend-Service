  /concerts:
    get:
      summary: List upcoming concerts (On Tour feed)
      description: >-
        Upcoming non-removed concerts windowed on the venue-local calendar
        date `starts_on`, ordered by `starts_on` ascending, paginated.
        `curated=true` narrows to concerts whose headliner resolved — to a
        WXYC catalog artist (`headlining_artist_id`) or to a Discogs artist
        identity (`headlining_discogs_artist_id`, the BS#1614 offline LML
        pass). Requires anonymous session auth.
      parameters:
        - name: curated
          in: query
          schema:
            type: boolean
            default: false
          description: Only concerts with a resolved headliner (catalog FK or Discogs artist id)
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Window start (inclusive) on starts_on; defaults to today (America/New_York)
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: Window end (inclusive) on starts_on; defaults to unbounded
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-indexed)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Page size
      responses:
        '200':
          description: Paginated list of upcoming concerts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcertsResponse'
        '400':
          description: Invalid query parameters
        '401':
          description: Authentication required
