openapi: 3.0.0
info:
  title: WXYC Backend API
  description: API for managing WXYC radio station operations including flowsheets, library, DJs, and schedule
  version: 1.0.0

servers:
  - url: http://localhost:{port}
    variables:
      port:
        default: '8080'
        description: Local API server port
  - url: https://api.wxyc.org

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: JWT token from AWS Cognito

  schemas:
    FlowsheetEntry:
      type: object
      properties:
        artist_name:
          type: string
        album_title:
          type: string
        track_title:
          type: string
        album_id:
          type: number
        rotation_id:
          type: number
        record_label:
          type: string
        request_flag:
          type: boolean
        track_position:
          type: string
          nullable: true
          description: >
            Discogs `release_track.position` (e.g. "A1", "B2") captured by the
            dj-site flowsheet picker (E6-6, dj-site#501). Optional; `null` for
            entries added without a position. Wired through POST /flowsheet and
            PATCH /flowsheet by BS#943.

    FlowsheetEntryV2:
      type: object
      required: [id, show_id, play_order, add_time, entry_type]
      discriminator:
        propertyName: entry_type
      properties:
        id:
          type: integer
        show_id:
          type: integer
        play_order:
          type: integer
        add_time:
          type: string
          format: date-time
        entry_type:
          type: string
          enum: [track, show_start, show_end, dj_join, dj_leave, talkset, breakpoint, message]
      description: >
        Discriminated union keyed by entry_type.
        track entries include artist_name, album_title, track_title, record_label, rotation_bin, metadata fields.
        track entries MAY also carry upcoming_show — an optional embedded Concert (see the Concert schema and GET /concerts) attached server-side at feed-assembly time when the track's resolved catalog artist (flowsheet.album_id → library.artist_id) has a curated, non-tombstoned, upcoming Triangle-area date (concerts.headlining_artist_id match; soonest date wins). Absent when there is no such match; older clients decode the absent field as "no touring CTA" (BS#1607). The canonical wire contract is FlowsheetV2TrackEntry.upcoming_show in wxyc-shared/api.yaml (the SSOT); this app.yaml is Swagger display only.
        show_start/show_end entries include dj_name and timestamp.
        dj_join/dj_leave entries include dj_name.
        talkset/breakpoint/message entries include message.
        breakpoint entries also include radio_hour (the authoritative top-of-hour as an ISO date-time, or null) — clients should format this rather than add_time.

    FlowsheetPaginatedResponse:
      type: object
      required: [entries, total, page, limit, totalPages]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/FlowsheetEntryV2'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
        on_air:
          allOf:
            - $ref: '#/components/schemas/OnAirInfo'
          nullable: true
          description: >-
            The DJ currently on air, when known. An OnAirInfo object means a named DJ is live; JSON null means the station is confirmed on automation ("Auto DJ"); the field being absent means the server does not report on-air status and clients should treat it as unknown. Not in required so absence stays distinct from an explicit null.

    OnAirInfo:
      type: object
      required: [dj_name]
      properties:
        dj_name:
          type: string
          description: Display name of the DJ currently on air.

    FlowsheetEntryAdd:
      type: object
      oneOf:
        - allOf:
            - $ref: '#/components/schemas/FlowsheetEntry'
            - type: object
              required: ['artist_name', 'album_title', 'track_title']
        - type: object
          required: ['message']
          properties:
            message:
              type: string

    Show:
      type: object
      properties:
        id:
          type: integer
        primary_dj_id:
          type: integer
        specialty_id:
          type: integer
        show_name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true

    DJ:
      type: object
      properties:
        id:
          type: integer
        shows_covered:
          type: integer
        add_date:
          type: string
          format: date

    NewDJ:
      type: object
      properties:
        cognito_user_name:
          type: string
        real_name:
          type: string
        dj_name:
          type: string

    ShowDJ:
      type: object
      properties:
        show_id:
          type: integer
        dj_id:
          type: integer
        active:
          type: boolean

    Album:
      type: object
      properties:
        id:
          type: integer
        code_letters:
          type: string
        code_artist_number:
          type: string
        code_number:
          type: integer
        artist_name:
          type: string
        album_title:
          type: string
        record_label:
          type: string
        plays:
          type: integer
        add_date:
          type: string
          format: date-time
        last_modified:
          type: string
          format: date-time

    NewAlbumRequest:
      type: object
      required: ['album_title', 'label', 'genre_id', 'format_id']
      properties:
        album_title:
          type: string
        artist_name:
          type: string
        artist_id:
          type: integer
        alternate_artist_name:
          type: string
        label:
          type: string
        genre_id:
          type: integer
        format_id:
          type: integer
        disc_quantity:
          type: integer

    AlbumView:
      type: object
      properties:
        id:
          type: integer
        code_letters:
          type: string
        code_artist_number:
          type: integer
        code_number:
          type: integer
        artist_name:
          type: string
        album_title:
          type: string
        format_name:
          type: string
        genre_name:
          type: string
        rotation_bin:
          type: string
          nullable: true
        add_date:
          type: string
          format: date-time
        label:
          type: string
          nullable: true

    CatalogExportRow:
      type: object
      description: >
        One catalog row in the `GET /library/catalog` NDJSON export (BS#1468).
        `rotation_bin` / `rotation_kill_date` are raw (the most-recently-added
        rotation record per album); the client evaluates "in rotation" locally.
      properties:
        id:
          type: integer
        artist_name:
          type: string
        album_title:
          type: string
        code_letters:
          type: string
        code_number:
          type: integer
        code_artist_number:
          type: integer
        label:
          type: string
          nullable: true
        genre_name:
          type: string
        format_name:
          type: string
        on_streaming:
          type: boolean
          nullable: true
        plays:
          type: integer
          nullable: true
        popularity:
          type: integer
          nullable: true
          description: >
            Attribution-corrected, master-collapsed popularity (BS#1486 Phase-2):
            collapses pressings sharing a Discogs master and folds in resolved
            free-text plays. null when the logical album has no plays. The SSOT
            (wxyc-shared api.yaml) carries the authoritative description.
        artwork_url:
          type: string
          nullable: true
        rotation_bin:
          type: string
          nullable: true
        rotation_kill_date:
          type: string
          format: date
          nullable: true

    BmiPerformanceRow:
      type: object
      description: >
        One played musical work in the `GET /library/bmi-performance-list` export
        (BS#1500). Flat projection of a `flowsheet` track row with a usable artist.
        `composer_source` is raw open-ended text (a source added after the endpoint,
        e.g. `musicbrainz_work`, can appear); consumers should not treat it as a
        closed enum.
      properties:
        artist_name:
          type: string
        track_title:
          type: string
          nullable: true
        album_title:
          type: string
          nullable: true
        record_label:
          type: string
          nullable: true
        composer:
          type: string
          nullable: true
        composer_source:
          type: string
          nullable: true
          description: 'Provenance of `composer`: discogs_track | discogs_release | artist_proxy | a later source | null.'
        played_at:
          type: string
          format: date-time
          description: The play's logging instant (`flowsheet.add_time`), ISO-8601.

    BmiCoverage:
      type: object
      description: >
        Composer-provenance breakdown for the pre-submit preview. The five counts
        partition `total`. `none` = no composer credit at all; `unknown` = a non-null
        `composer_source` outside the known set (a real credit from a later source),
        kept distinct from `none` so a credited play is never reported as having no composer.
      properties:
        total:
          type: integer
        real_track:
          type: integer
        real_release:
          type: integer
        artist_proxy:
          type: integer
        none:
          type: integer
        unknown:
          type: integer

    BmiPerformanceList:
      type: object
      description: The `GET /library/bmi-performance-list` response envelope (BS#1500).
      properties:
        range:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        coverage:
          $ref: '#/components/schemas/BmiCoverage'
        rows:
          type: array
          items:
            $ref: '#/components/schemas/BmiPerformanceRow'

    Rotation:
      type: object
      properties:
        id:
          type: integer
        code_letters:
          type: string
        code_artist_number:
          type: integer
        code_number:
          type: integer
        artist_name:
          type: string
        album_title:
          type: string
        record_label:
          type: string
        genre_name:
          type: string
        format_name:
          type: string
        rotation_id:
          type: integer
        add_date:
          type: string
          format: date
        rotation_bin:
          type: string
          enum: ['S', 'L', 'M', 'H', 'N']
        kill_date:
          type: string
          format: date
          nullable: true
        plays:
          type: integer

    NewRotationRequest:
      type: object
      required: ['album_id', 'rotation_bin']
      properties:
        album_id:
          type: integer
        rotation_bin:
          type: string
          enum: ['S', 'L', 'M', 'H', 'N']
        kill_date:
          type: string
          format: date

    BinLibraryDetails:
      type: object
      properties:
        album_id:
          type: integer
        album_title:
          type: string
        artist_name:
          type: string
        label:
          type: string
        code_letters:
          type: string
        code_artist_number:
          type: integer
        code_number:
          type: integer
        format_name:
          type: string
        genre_name:
          type: string

    Schedule:
      type: object
      properties:
        id:
          type: integer
          description: Primary key
        day:
          type: integer
          description: Day of the week 0 = Monday, 6 = Sunday
          minimum: 0
          maximum: 6
        start_time:
          type: string
          format: time
          description: Show start time
        show_duration:
          type: integer
          description: Duration in minutes
          minimum: 1
        specialty_id:
          type: integer
          nullable: true
          description: Reference to specialty show, null for regular shows
        assigned_dj_id:
          type: integer
          nullable: true
          description: Reference to primary DJ
        assigned_dj_id2:
          type: integer
          nullable: true
          description: Reference to secondary DJ

    ShowPeek:
      type: object
      properties:
        show:
          type: integer
        show_name:
          type: string
        date:
          type: string
          format: date-time
        djs:
          type: array
          items:
            type: object
            properties:
              dj_id:
                type: integer
              dj_name:
                type: string
                nullable: true
        specialty_show:
          type: string
        preview:
          type: array
          items:
            $ref: '#/components/schemas/FlowsheetEntryV2'

    Venue:
      type: object
      description: A live-music venue whose calendar WXYC ingests. Embedded whole in Concert.
      required:
        - id
        - slug
        - name
        - city
        - state
        - address
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        city:
          type: string
        state:
          type: string
        address:
          type: string
          nullable: true

    Concert:
      type: object
      description: >-
        One upcoming (or recent) concert. `starts_on` is the venue-local
        calendar date and is always present; `starts_at` is the exact instant
        and is null for date-only events. Internal ingestion columns are not
        exposed.
      required:
        - id
        - venue
        - starts_on
        - starts_at
        - doors_at
        - headlining_artist_raw
        - headlining_artist_id
        - title
        - supporting_artists_raw
        - ticket_url
        - image_url
        - event_url
        - price_min
        - price_max
        - age_restriction
        - status
      properties:
        id:
          type: integer
        venue:
          $ref: '#/components/schemas/Venue'
        starts_on:
          type: string
          format: date
        starts_at:
          type: string
          format: date-time
          nullable: true
        doors_at:
          type: string
          format: date-time
          nullable: true
        headlining_artist_raw:
          type: string
        headlining_artist_id:
          type: integer
          nullable: true
        title:
          type: string
          nullable: true
        supporting_artists_raw:
          type: array
          items:
            type: string
        ticket_url:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        event_url:
          type: string
          nullable: true
          description: >-
            The venue's own event-detail page, distinct from ticket_url (often
            a third-party seller). Null when no venue page is known.
        price_min:
          type: number
          nullable: true
        price_max:
          type: number
          nullable: true
        age_restriction:
          type: string
          nullable: true
        status:
          type: string
          enum: [on_sale, sold_out, cancelled, rescheduled]

    ConcertsResponse:
      type: object
      required:
        - concerts
        - pagination
      properties:
        concerts:
          type: array
          items:
            $ref: '#/components/schemas/Concert'
        pagination:
          type: object
          required:
            - page
            - limit
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            hasMore:
              type: boolean

security:
  - BearerAuth: []

paths:
  /flowsheet:
    get:
      summary: Get flowsheet entries
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          description: Number of entries to return
        - name: shows_limit
          in: query
          schema:
            type: integer
          description: Number of shows to return entries from
        - name: page
          in: query
          schema:
            type: integer
          description: Page number for pagination ** compatible with either limit or shows_limit
        - name: start_id
          in: query
          schema:
            type: integer
          description: first play_order id in range ** Must be provided together with end_id
        - name: end_id
          in: query
          schema:
            type: integer
          description: last play_order id in range ** Must be provided together with start_id
      responses:
        '200':
          description: Paginated flowsheet entries (discriminated union format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowsheetPaginatedResponse'

    post:
      summary: Add entry to flowsheet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - allOf:
                    - $ref: '#/components/schemas/FlowsheetEntry'
                    - type: object
                      required: ['artist_name', 'album_title', 'track_title']
                - type: object
                  required: ['message']
                  properties:
                    message:
                      type: string
      responses:
        '200':
          description: Successfully added entry
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/FlowsheetEntry'
                  - type: object
                    properties:
                      id:
                        type: integer
                      play_order:
                        type: integer
                      show_id:
                        type: integer
                      message:
                        type: string

    patch:
      summary: Update flowsheet entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                artist_name:
                  type: string
                album_title:
                  type: string
                track_title:
                  type: string
                track_position:
                  type: string
                  nullable: true
                  description: >
                    Discogs `release_track.position`; pass `null` to clear.
                    See FlowsheetEntry.track_position.
                record_label:
                  type: string
                request_flag:
                  type: string
                message:
                  type: string
      responses:
        '200':
          description: Successfully updated entry
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/FlowsheetEntry'
                  - type: object
                    properties:
                      id:
                        type: integer
                      play_order:
                        type: integer
                      show_id:
                        type: integer
                      message:
                        type: string

    delete:
      summary: Delete flowsheet entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry_id:
                  type: integer
      responses:
        '200':
          description: Successfully deleted entry
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/FlowsheetEntry'
                  - type: object
                    properties:
                      id:
                        type: integer
                      play_order:
                        type: integer
                      show_id:
                        type: integer
                      message:
                        type: string

  /flowsheet/latest:
    get:
      summary: Get the most recent flowsheet entry
      responses:
        '200':
          description: Latest flowsheet entry (discriminated union format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowsheetEntryV2'

  /flowsheet/join:
    post:
      summary: Start or join a show
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ['dj_id']
              properties:
                dj_id:
                  type: integer
                show_name:
                  type: string
                  description: Required only when starting a new show
                specialty_id:
                  type: integer
                  description: id of specialty show entry

      responses:
        '200':
          description: Successfully joined/started show
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Show'
                    description: 'Show started'
                  - $ref: '#/components/schemas/ShowDJ'
                    description: 'Show joined'

  /flowsheet/end:
    post:
      summary: End or leave a show
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dj_id:
                  type: integer
      responses:
        '200':
          description: Successfully ended/left show
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Show'
                    description: 'Show started'
                  - $ref: '#/components/schemas/ShowDJ'
                    description: 'Show joined'

  /flowsheet/djs-on-air:
    get:
      summary: Get list of DJs currently on air
      responses:
        '200':
          description: List of active DJs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    dj_name:
                      type: string

  /flowsheet/on-air:
    get:
      summary: Get on-air status for dj
      parameters:
        - name: dj_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Current show details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  is_live:
                    type: boolean

  /flowsheet/play-order:
    patch:
      summary: Update the play order of a flowsheet entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ['entry_id', 'new_position']
              properties:
                entry_id:
                  type: integer
                new_position:
                  type: integer
      responses:
        '200':
          description: Successfully updated play order
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/FlowsheetEntry'
                  - type: object
                    properties:
                      id:
                        type: integer
                      play_order:
                        type: integer
                      show_id:
                        type: integer
                      message:
                        type: string

  /flowsheet/playlist:
    get:
      summary: Get complete playlist for a show
      parameters:
        - name: show_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Complete flowsheet for show
          content:
            application/json:
              schema:
                type: object
                properties:
                  show_name:
                    type: string
                  specialty_show:
                    type: string
                  start_time:
                    type: string
                    format: date-time
                  end_time:
                    type: string
                    format: date-time
                  show_djs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        dj_name:
                          type: string
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/FlowsheetEntryV2'

  /djs:
    get:
      summary: Get DJ information
      parameters:
        - name: dj_id
          in: query
          schema:
            type: integer
        - name: cognito_user_name
          in: query
          schema:
            type: string
      responses:
        '200':
          description: DJ information
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DJ'
                  - $ref: '#/components/schemas/NewDJ'

  /djs/register:
    post:
      summary: Register a new DJ
      security:
        - BearerAuth: ['station-management']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewDJ'
      responses:
        '200':
          description: Successfully registered DJ

    patch:
      summary: Update DJ information
      security:
        - BearerAuth: ['station-management']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewDJ'
      responses:
        '200':
          description: Successfully updated DJ

  /djs/bin:
    get:
      summary: Get DJ bin
      parameters:
        - name: dj_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: DJ bin contents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BinLibraryDetails'

    post:
      summary: Add to DJ bin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ['dj_id', 'album_id']
              properties:
                dj_id:
                  type: integer
                album_id:
                  type: integer
                track_title:
                  type: integer
      responses:
        '200':
          description: Successfully added to bin

    delete:
      summary: Remove from DJ bin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ['dj_id', 'album_id']
              properties:
                dj_id:
                  type: integer
                album_id:
                  type: integer
                track_title:
                  type: integer
      responses:
        '200':
          description: Successfully removed from bin

  /djs/playlists:
    get:
      summary: Get playlists for DJ
      responses:
        '200':
          description: List of DJ playlists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShowPeek'

  /library:
    get:
      summary: Search for album
      parameters:
        - name: artist_name
          in: query
          schema:
            type: string
        - name: album_title
          in: query
          schema:
            type: string
        - name: n
          in: query
          schema:
            type: number
        - name: page
          in: query
          schema:
            type: number
      responses:
        '200':
          description: List of matching albums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlbumView'

    post:
      summary: Add new album
      security:
        - BearerAuth: ['station-management']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAlbumRequest'
      responses:
        '200':
          description: Successfully added album

  /library/query:
    get:
      summary: Query-builder search over the catalog
      parameters:
        - name: q
          in: query
          description: 'Search query; supports artist:/album:/label: prefixes, quoted exact match, and NOT'
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: sort
          in: query
          schema:
            type: string
            enum: [artist, album, plays, date]
            default: album
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: on_streaming
          in: query
          schema:
            type: boolean
        - name: missing
          in: query
          description: 'true: only albums currently marked missing; false: only non-missing albums'
          schema:
            type: boolean
        - name: genre
          in: query
          description: Single genre name (alias for genres)
          schema:
            type: string
        - name: genres
          in: query
          description: Comma-separated genre names, ORed together
          schema:
            type: string
        - name: format
          in: query
          description: Single format name (alias for formats)
          schema:
            type: string
        - name: formats
          in: query
          description: Comma-separated format names, ORed together
          schema:
            type: string
        - name: rotation_bins
          in: query
          description: Comma-separated rotation bin codes (S, L, M, H), ORed together
          schema:
            type: string
      responses:
        '200':
          description: Paginated catalog search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/AlbumView'
                  total:
                    type: integer
                  page:
                    type: integer
                  totalPages:
                    type: integer
        '400':
          description: Invalid query parameter

  /library/{id}:
    patch:
      summary: Partially update an album (only provided fields are written)
      security:
        - BearerAuth: ['station-management']
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one field must be provided
              properties:
                album_title:
                  type: string
                label:
                  type: string
                label_id:
                  type: integer
                  nullable: true
                  description: Must reference an existing label; null clears the label
                genre_id:
                  type: integer
                format_id:
                  type: integer
                artist_id:
                  type: integer
                alternate_artist_name:
                  type: string
                  nullable: true
                disc_quantity:
                  type: integer
                  minimum: 1
                  maximum: 99
      responses:
        '200':
          description: Updated album
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Album'
        '400':
          description: Invalid field value or no updatable fields provided
        '404':
          description: Album or artist not found

  /library/{id}/missing:
    patch:
      summary: Mark an album as missing
      security:
        - BearerAuth: ['station-management']
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated album
        '404':
          description: Album not found

  /library/{id}/found:
    patch:
      summary: Mark an album as found
      security:
        - BearerAuth: ['station-management']
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated album
        '404':
          description: Album not found

  /library/catalog:
    get:
      summary: Bulk catalog export (gzipped NDJSON, conditional-GET)
      description: >
        Returns the entire music library catalog as one gzipped NDJSON body
        (one JSON object per line) for clients that clone the catalog on-device
        (e.g. iOS Core Spotlight indexing). Freshness is gated by the catalog
        watermark: send `If-Modified-Since` (or `?since=`) and receive `304 Not
        Modified` while the catalog is unchanged (it changes ~daily, after the
        library ETL sync), or a fresh `200` with the full payload when it has
        advanced. `rotation_bin` and `rotation_kill_date` are exported raw (the
        most-recently-added rotation record per album); the client evaluates
        "in rotation" against its own clock as
        `rotation_bin != null && (rotation_kill_date == null || rotation_kill_date > today)`.
      security:
        - BearerAuth: ['catalog-read']
      parameters:
        - name: If-Modified-Since
          in: header
          required: false
          description: RFC 9110 HTTP date from a prior response's `Last-Modified`.
          schema:
            type: string
        - name: since
          in: query
          required: false
          description: Alternative to `If-Modified-Since` (any parseable date string).
          schema:
            type: string
      responses:
        '200':
          description: Full catalog as gzipped NDJSON. One CatalogExportRow per line.
          headers:
            Last-Modified:
              description: Catalog watermark; echo back as `If-Modified-Since`.
              schema:
                type: string
            Content-Encoding:
              description: '`gzip` when the request accepts gzip.'
              schema:
                type: string
            Vary:
              schema:
                type: string
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/CatalogExportRow'
        '304':
          description: Catalog unchanged since `If-Modified-Since` / `since`.
        '401':
          description: Missing or invalid bearer token.

  /library/bmi-performance-list:
    get:
      summary: BMI played-works export for a date range (BS#1500)
      description: >
        Successor to tubafrenzy's `recentBMI` servlet: the played musical works the
        station librarian submits to BMI for royalty reporting. Reads `flowsheet` track
        rows with a usable artist whose `add_time` falls in the half-open `[from, to]`
        window (the whole `to` day is included), ordered chronologically, and returns the
        rows plus a composer-provenance `coverage` summary the dj-site admin tool previews
        before submit. Gated to MD/SM via `catalog:['write']`. The window width is capped
        (max 366 days); the exact BMI submission text format and the artist-proxy inclusion
        default are finalized in #1507 and do not change this envelope.
      security:
        - BearerAuth: ['catalog-write']
      parameters:
        - name: from
          in: query
          required: true
          description: Inclusive start of the window, `YYYY-MM-DD` (UTC-day boundary).
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          description: Inclusive end of the window, `YYYY-MM-DD`. Must not precede `from`; the window may span at most 366 days.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Played works in the window plus the coverage summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BmiPerformanceList'
        '400':
          description: Missing, malformed, out-of-order, or too-wide `from`/`to` range.
        '401':
          description: Missing or invalid bearer token.
        '403':
          description: Authenticated role lacks `catalog:write` (below musicDirector).

  /library/rotation:
    get:
      summary: Get rotation list
      responses:
